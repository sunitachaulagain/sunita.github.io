<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sunita | Contact</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css"
      rel="stylesheet"
    />
    <style>
      /* Full-screen light gradient background */
      body,
      html {
        height: 100%;
        margin: 0;
        font-family: "Segoe UI", sans-serif;
        background: linear-gradient(135deg, #fdfbfb, #ebedee);
      }

      /* Centering container */
      #contact {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 4rem 0;
      }

      /* Floating contact card */
      .contact-card {
        background: #ffffff;
        border-radius: 20px;
        padding: 3rem;
        box-shadow: 0 15px 50px rgba(0, 0, 0, 0.1);
        width: 100%;
        max-width: 600px;
        text-align: center;
        transition: transform 0.3s, box-shadow 0.3s;
      }

      .contact-card:hover {
        transform: translateY(-10px);
        box-shadow: 0 25px 60px rgba(0, 0, 0, 0.15);
      }

      /* Heading style */
      .contact-card h2 {
        margin-bottom: 2rem;
        font-weight: bold;
        color: #333;
        letter-spacing: 1px;
      }

      /* Icon buttons style */
      .contact-links a {
        font-size: 1.8rem;
        margin: 0 1rem;
        color: #6c63ff;
        transition: transform 0.3s, color 0.3s;
      }

      .contact-links a:hover {
        transform: translateY(-5px);
        color: #5750d6;
      }

      /* Optional small text */
      .contact-card p {
        margin-top: 1.5rem;
        color: #555;
      }
    </style>
  </head>
  <body>
    <!-- Navbar -->
    <nav
      class="navbar navbar-expand-lg navbar-dark bg-dark fixed-top shadow-sm"
    >
      <div class="container">
        <a class="navbar-brand fw-bold fs-4" href="index.html">Sunita</a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarNav"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div
          class="collapse navbar-collapse justify-content-end"
          id="navbarNav"
        >
          <ul class="navbar-nav">
            <li class="nav-item">
              <a class="nav-link" href="index.html">Home</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="about.html">About</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="projects.html">Projects</a>
            </li>
            <li class="nav-item">
              <a class="nav-link active" href="contact.html">Contact</a>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <!-- Contact Section -->
    <section id="contact">
      <div class="contact-card">
        <h2>Contact Me</h2>
        <div class="contact-links">
          <a
            href="mailto:sunitachaulagain97@gmail.com"
            target="_blank"
            title="Email"
            ><i class="bi bi-envelope-fill"></i
          ></a>
          <a
            href="https://github.com/sunitachaulagain"
            target="_blank"
            title="GitHub"
            ><i class="bi bi-github"></i
          ></a>
          <a
            href="https://www.linkedin.com/in/sunita-chaulagain/"
            target="_blank"
            title="LinkedIn"
            ><i class="bi bi-linkedin"></i
          ></a>
        </div>
        <p>
          Feel free to connect with me via email or check out my profiles on
          GitHub and LinkedIn.
        </p>
      </div>
    </section>

    <!-- Footer -->
    <footer class="bg-dark text-white text-center py-3 mt-5">
      <p class="mb-0">© 2025 Sunita | Built with ❤️ and Bootstrap</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
